<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Voos Oficiais do Governador - Governo de Minas Gerais</title>

    <!-- ==================== ESTILOS E BIBLIOTECAS ==================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bibliotecas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <!-- Chart.js e PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
            min-height: auto;
            height: auto;
            position: relative;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .container-fluid { width: 100%; max-width: 88% !important; padding: 0 40px; margin: 0 auto; height: auto; }
        .container { max-width: 85% !important; }
        .dashboard-container { width: 100%; max-width: 100%; padding: 0 40px; margin: 0 auto; height: auto; min-height: auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container { height: auto; min-height: auto; overflow: visible; position: relative; }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 15px 0; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            border-left: none;
            width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .filter-label i { font-size: 14px; color: var(--accent-red); }
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            transition: all 0.3s ease;
            height: auto;
            width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); }
        .modern-select {
            border: 1.5px solid #dfe5ec !important;
            border-radius: 8px !important;
            padding: 10px 12px !important;
            font-size: 14px !important;
            height: 48px !important;
            line-height: 1.5 !important;
            background-color: #fff;
            transition: all 0.2s ease;
            width: 100%;
        }
        .modern-select:focus { border-color: #1a3a5c !important; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); }
        .filters-row { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 120px; }
        .consulta-filters-row { display: flex; flex-wrap: wrap; gap: 15px; width: 100%; }
        .consulta-filter-group { flex: 1 1 calc(33.333% - 15px); min-width: 200px; }
        .consulta-buttons-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; justify-content: flex-start; flex-wrap: wrap; }
        .botoes-abaixo { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ============================================================
           6. CARDS DE MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 20px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           7. GRÁFICOS
        ============================================================ */
        .chart-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            min-height: 320px;
            padding: 0;
            overflow: hidden;
        }
        .chart-container canvas { max-width: 100%; }
        .chart-header { background: #20445d; color: white; padding: 12px 16px; margin: 0; }
        .chart-title { font-size: 14px; font-weight: 600; color: white; margin: 0; }
        .chart-wrapper { height: 260px; display: flex; align-items: center; justify-content: center; padding: 10px 15px; width: 100%; position: relative; }

        /* ============================================================
           8. TABELAS
        ============================================================ */
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-title { font-size: 13px; font-weight: 600; margin: 0; }
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 10px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: auto; margin-bottom: 0; }
        .table th, .table td { border: 1px solid #d6dee6; }
        .table thead th {
            background-color: #54697b !important;
            color: white !important;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 10px;
            text-transform: uppercase;
            border: 1px solid #d6dee6;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:first-child { border-top-left-radius: 8px; }
        .table thead th:last-child { border-top-right-radius: 8px; }
        .table thead th:hover { background-color: #3d5566 !important; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody td { padding: 10px 10px; vertical-align: middle; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        .table tbody tr:nth-child(even) { background-color: #ffffff; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table-bordered { border: 1px solid #dee2e6; width: 100%; }
        .table-bordered th, .table-bordered td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        .table-responsive { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .link-mes, .data-link { color: #006a82; text-decoration: none; font-weight: 400; cursor: pointer; }
        .link-mes:hover, .data-link:hover { color: var(--accent-red); text-decoration: underline; }

        /* ============================================================
           9. SORTABLE HEADERS
        ============================================================ */
        .sortable-header { cursor: pointer; position: relative; padding-right: 22px !important; }
        .sortable-header:hover { background-color: #3d5566 !important; }
        .sortable-header i { font-size: 13px; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; }

        /* ============================================================
           10. BOTÕES
        ============================================================ */
        .btn-primary-custom, .btn-pesquisa {
            background: linear-gradient(to right, #20445d, #20445d);
            border: none;
            padding: 0 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 13px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
        }
        .btn-primary-custom:hover, .btn-pesquisa:hover {
            background: linear-gradient(to right, var(--accent-red), #a32c32);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(185,60,66,0.2);
            color: white;
        }
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
            text-decoration: none !important;
        }
        .btn-secondary-custom:hover { background-color: #132837 !important; color: white !important; border-color: #132837 !important; }
        .btn-export {
            appearance: none;
            -webkit-appearance: none;
            background: transparent !important;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 0 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-export i { font-size: 14px !important; }
        button.btn-export:hover, a.btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px;
            border-radius: 7px;
            border: 1.5px solid #1a3a5c;
            background-color: #ffffff;
            color: #1a3a5c;
            width: 32px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        /* Botão Voltar ao Topo */
        #btnTopo, .btn-topo {
            background: #eeeff5;
            color: #1a3a5c;
            border: 1px solid #d6dee6;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: 32px;
        }
        #btnTopo:hover, .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* ============================================================
           11. COMPARTILHAR
        ============================================================ */
        .share-dropdown { position: relative; display: inline-block; }
        .share-options {
            display: none; position: absolute; right: 0; top: 100%;
            background-color: white; min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); border-radius: 8px;
            padding: 8px; z-index: 1000; border: 1px solid #dee2e6; margin-top: 5px;
        }
        .share-options.show { display: block; }
        .share-options a {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            border-radius: 6px; font-size: 13px; color: var(--primary-dark);
            transition: background 0.2s; cursor: pointer; text-decoration: none;
        }
        .share-options a:hover { background-color: var(--background-light); color: var(--accent-red); }
        .share-options a i { font-size: 14px; width: 20px; text-align: center; }

        /* ============================================================
           12. BUSCA NA TABELA
        ============================================================ */
        .table-search-container {
            display: flex;
            align-items: center;
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid #d6dee6;
            border-radius: 8px;
            padding: 5px 10px;
            height: 34px;
        }
        .table-search-container:hover { border-color: #1a3a5c; }
        .table-search-input { border: none !important; outline: none; background: transparent; font-size: 12px; width: 180px; color: #1a3a5c; }
        .table-search-input::placeholder { color: #94a3b8; }
        .clear-icon { cursor: pointer; font-size: 14px; color: #94a3b8; margin-left: 5px; display: none; }
        .clear-icon:hover { color: var(--accent-red); }

        /* ============================================================
           13. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 15px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 14px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }
        
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 14px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
        }
        
        /* ============================================================
           14. MODAL
        ============================================================ */
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important;
            padding: 15px 20px;
            border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .modal-title i { color: white !important; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .modal-creative .modal-header .btn-close:hover { opacity: 0.8; }
        .info-card { background: #f8fafd; border-radius: 10px; padding: 16px; box-shadow: none; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .info-label { font-size: 11px; text-transform: uppercase; color: #6c757d; font-weight: 600; margin-bottom: 4px; }
        .info-value { font-size: 13px; font-weight: 600; color: var(--primary-dark); word-break: break-word; }
        .info-value.highlight { font-size: 16px; color: var(--accent-red); }

        /* ============================================================
           15. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            width: 100%;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pagination-info { font-size: 12px; color: #6c757d; }
        .pagination .page-link { color: var(--primary-dark); border-color: #dee2e6; font-size: 13px; padding: 4px 10px; }
        .pagination .page-link:hover { color: var(--accent-red); background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: var(--primary-dark); border-color: var(--primary-dark); color: white; }
        .items-per-page {
            height: 34px;
            min-width: 80px;
            border-radius: 8px;
            border: 1px solid #d6dee6;
            padding: 4px 28px 4px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a5c;
            background-color: #ffffff;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231a3a5c' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 6px center;
        }

        /* ============================================================
           16. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ============================================================
           17. LOADING
        ============================================================ */
        .loading-indicator { display: none !important; }

        /* ============================================================
           18. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e6f4ea;
            color: #1e4620;
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 9999;
            min-width: 280px;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }

        /* ============================================================
           19. RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 992px) {
            .container-fluid, .dashboard-container { padding: 0 15px; }
        }
        @media (max-width: 768px) {
            .filters-row { flex-direction: column; align-items: stretch; }
            .filter-group { min-width: 100%; }
            .consulta-filter-group { flex: 1 1 100%; }
            .nav-tabs { flex-direction: column; align-items: stretch; }
            .nav-tabs .nav-link { justify-content: flex-start; }
            .d-flex.justify-content-between { flex-direction: column; gap: 10px; align-items: flex-start !important; }
            .container-fluid, .dashboard-container { padding: 0 12px; }
            .container { max-width: 100% !important; }
            .table-search-input { width: 100% !important; }
            .pagination-container { flex-direction: column; gap: 8px; }
        }

        /* ============================================================
           20. ESTILOS ADICIONAIS
        ============================================================ */
        .metadata-card { background: white; border-radius: 8px; padding: 20px; margin-top: 20px; }
        .metadata-item { font-size: 12px; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .metadata-item strong { color: var(--primary-dark); width: 180px; display: inline-block; }
        .fw-bold { font-weight: 700; }
        .mb-3 { margin-bottom: 1rem; }
        .mt-4 { margin-top: 2rem; }
        .me-2 { margin-right: 0.5rem; }
        h5 { font-size: 14px; color: var(--primary-dark); padding-bottom: 8px; font-weight: 700; }
        .tooltip-inner { background-color: #2f3b45 !important; color: #fff; font-size: 12px; padding: 6px 10px; border-radius: 6px; max-width: 250px; }
        .tooltip.bs-tooltip-top .tooltip-arrow::before { border-top-color: #2f3b45 !important; }
        .tooltip.bs-tooltip-bottom .tooltip-arrow::before { border-bottom-color: #2f3b45 !important; }
        .info-icon { font-size: 14px; color: white; background-color: #1a3a5c; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        code { font-size: 11px; background: #f0f4f8; padding: 2px 5px; border-radius: 3px; color: #1a3a5c; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="container-fluid dashboard-container">
        <!-- ==================== MENU DE NAVEGAÇÃO ==================== -->
        <div class="nav-tabs-container">
            <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="visao-geral-tab" data-bs-toggle="tab" data-bs-target="#visao-geral">
                        <i class="material-icons">bar_chart</i>Visão Geral
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="consulta-tab" data-bs-toggle="tab" data-bs-target="#consulta">
                        <i class="material-icons">flight</i>Voos por Destino
                    </button>
                </li>
                <li class="nav-item">

    // ============================================
    // FUNÇÕES AUXILIARES
    // ============================================
    function horasParaDecimal(horasStr) {
        if (!horasStr) return 0;
        let partes = horasStr.split(':');
        if (partes.length >= 2) return parseInt(partes[0]) + parseInt(partes[1]) / 60;
        return 0;
    }

    function formatarHoras(horasDecimal) {
        let horas = Math.floor(horasDecimal);
        let minutos = Math.round((horasDecimal - horas) * 60);
        return `${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}`;
    }

    function formatarData(dataStr) {
        if (!dataStr) return '';
        if (dataStr.includes('/')) return dataStr;
        if (dataStr.includes('-')) {
            let partes = dataStr.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }
        return dataStr;
    }

    function showLoading(show, message = 'Carregando dados...') {
        // Função mantida para compatibilidade
    }

    function showError(message) {
        const container = document.querySelector('.main-container');
        if (!container) return;
        
        const errorDiv = document.createElement('div');
        errorDiv.className = 'alert alert-danger alert-dismissible fade show';
        errorDiv.innerHTML = `
            <i class="material-icons me-2" style="vertical-align: middle;">warning</i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        container.prepend(errorDiv);
        
        setTimeout(() => {
            errorDiv.remove();
        }, 5000);
    }

    async function setupAtualizacaoData() {
        const el = document.getElementById('data-atualizacao-header');
        if (!el) return;
        try {
            const GITHUB_API_COMMITS = 'https://api.github.com/repos/transparencia-mg/portal_voos_oficiais_governador/commits?path=dataset/data&per_page=1';
            const resp = await fetch(GITHUB_API_COMMITS);
            if (!resp.ok) throw new Error('api error');
            const commits = await resp.json();
            if (commits && commits.length > 0) {
                const dt = new Date(commits[0].commit.committer.date);
                el.textContent = ' ' + dt.toLocaleDateString('pt-BR');
                return;
            }
        } catch(e) {}
        el.textContent = ' ' + new Date().toLocaleDateString('pt-BR');
    }

    // ============================================
    // CARREGAMENTO DE DADOS
    // ============================================
    async function carregarDadosIniciais() {
        showLoading(true, 'Carregando dados de voos...');
        
        try {
            console.log('🚀 Carregando dados de voos...');
            
            for (const ano of Object.keys(CSV_FILES_BY_YEAR)) {
                const url = `${GITHUB_BASE_URL}${CSV_FILES_BY_YEAR[ano]}`;
                
                await new Promise((resolve) => {
                    Papa.parse(url, {
                        download: true,
                        header: true,
                        delimiter: ";",
                        skipEmptyLines: true,
                        complete: function(results) {
                            results.data.forEach(r => {
                                if (!r.data_voo) return;
                                
                                let dataVoo = r.data_voo;
                                let anoVoo = ano;
                                let mesVoo = '01';
                                
                                if (dataVoo.includes('/')) {
                                    let p = dataVoo.split('/');
                                    anoVoo = p[2];
                                    mesVoo = p[1];
                                } else if (dataVoo.includes('-')) {
                                    let p = dataVoo.split('-');
                                    anoVoo = p[0];
                                    mesVoo = p[1];
                                }
                                
                                dadosCompletos.push({
                                    ano: anoVoo,
                                    mes: mesVoo,
                                    data_voo: r.data_voo,
                                    numero_db: r.numero_db || '',
                                    origem: r.origem || '',
                                    destino: r.destino || '',
                                    historico: r.historico || '',
                                    horas_voadas: r.horas_voadas || '00:00',
                                    horas_decimais: horasParaDecimal(r.horas_voadas),
                                    aeronave: r.aeronave || '',
                                    passageiro: r.passageiro || '',
                                    cargo_passageiro: r.cargo_passageiro || '',
                                    orgao_passageiro: r.orgao_passageiro || ''
                                });
                            });
                            resolve();
                        },
                        error: function() {
                            resolve();
                        }
                    });
                });
            }
            
            if (dadosCompletos.length === 0) {
                throw new Error('Não foi possível carregar os dados');
            }
            
            console.log(`✅ Carregados ${dadosCompletos.length} registros de voos`);
            
            dadosFiltradosVG = [...dadosCompletos];
            dadosFiltradosDestino = [...dadosCompletos];
            dadosFiltradosPassageiros = [...dadosCompletos];
            
            // Default: filtrar pelo ano mais recente em VG e Passageiros
            const anosDisponiveis = [...new Set(dadosCompletos.map(d => d.ano))].sort((a,b)=>b-a);
            const anoMaisRecente = anosDisponiveis[0] || '';
            if (anoMaisRecente) {
                dadosFiltradosVG = dadosCompletos.filter(v => v.ano === anoMaisRecente);
                dadosFiltradosPassageiros = dadosCompletos.filter(v => v.ano === anoMaisRecente);
                _filtroPassageiroAno = anoMaisRecente;
            }
            
            atualizarPassageirosUnicos();
            
            renderizarVisaoGeral();
            renderizarConsultaDestino();
            renderizarConsultaPassageiro();
            renderizarDownloads();
            
        } catch (erro) {
            console.error('Erro no carregamento inicial:', erro);
            showError('Erro ao carregar dados. Tente novamente mais tarde.');
        } finally {
            showLoading(false);
        }
    }
    
    function atualizarPassageirosUnicos() {
        const mapa = new Map();
        dadosFiltradosPassageiros.forEach(v => {
            if (v.passageiro && !mapa.has(v.passageiro)) {
                mapa.set(v.passageiro, {
                    nome: v.passageiro,
                    orgao: v.orgao_passageiro || '-',
                    cargo: v.cargo_passageiro || '-',
                    voos: 0,
                    horas: 0
                });
            }
        });
        
        dadosFiltradosPassageiros.forEach(v => {
            if (v.passageiro && mapa.has(v.passageiro)) {
                const p = mapa.get(v.passageiro);
                p.voos++;
                p.horas += v.horas_decimais;
            }
        });
        
        passageirosUnicos = Array.from(mapa.values()).sort((a, b) => a.nome.localeCompare(b.nome));
    }

    // ============================================
    // RENDERIZAÇÃO VISÃO GERAL

    function agruparPorMes(dados) {
        const grupos = {};
        dados.forEach(v => {
            if (!grupos[v.mes]) {
                grupos[v.mes] = { voos: new Set(), passageiros: 0, horas: 0 };
            }
            grupos[v.mes].voos.add(v.numero_db || `${v.data_voo}_${v.origem}_${v.destino}`);
            grupos[v.mes].passageiros++;
            grupos[v.mes].horas += v.horas_decimais;
        });
        
        return Object.entries(grupos).map(([mes, d]) => ({
            mesNum: mes,
            mes: mesesMap[mes] || mes,
            voos: d.voos.size,
            passageiros: d.passageiros,
            horas: d.horas,
            media: d.voos.size ? d.horas / d.voos.size : 0
        }));
    }
    
    function ordenarDadosVG(dados) {
        return [...dados].sort((a, b) => {
            let valA, valB;
            switch (sortConfigVG.coluna) {
                case 'mes':
                    valA = parseInt(a.mesNum);
                    valB = parseInt(b.mesNum);
                    break;
                case 'voos':
                    valA = a.voos;
                    valB = b.voos;
                    break;
                case 'passageiros':
                    valA = a.passageiros;
                    valB = b.passageiros;
                    break;
                case 'horas':
                    valA = a.horas;
                    valB = b.horas;
                    break;
                case 'media':
                    valA = a.media;
                    valB = b.media;
                    break;
                default:
                    valA = a.mesNum;
                    valB = b.mesNum;
            }
            if (sortConfigVG.direcao === 'asc') return valA > valB ? 1 : -1;
            return valA < valB ? 1 : -1;
        });
    }
    
    function calcularMetricasVG() {
        let voosUnicos = new Set();
        let totalPassageiros = 0;
        let totalHoras = 0;
        let aeronavesUnicas = new Set();
        
        dadosFiltradosVG.forEach(v => {
            voosUnicos.add(v.numero_db || `${v.data_voo}_${v.origem}_${v.destino}`);
            totalPassageiros++;
            totalHoras += v.horas_decimais;
            aeronavesUnicas.add(v.aeronave);
        });
        
        return {
            totalVoos: voosUnicos.size,
            totalPassageiros: totalPassageiros,
            totalHoras: totalHoras,
            totalAeronaves: aeronavesUnicas.size
        };
    }
    
    function atualizarGraficosVG() {

                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }

        dadosFiltradosVG.forEach(v => { destinos[v.destino] = (destinos[v.destino] || 0) + 1; });
        const top10 = Object.entries(destinos).sort((a, b) => b[1] - a[1]).slice(0, 10);

        if (ctxDestinos) {

    function ordenarDadosPassageiro(dados) {
        return [...dados].sort((a, b) => {
            let valA = a[sortConfigPassageiro.coluna] || '';
            let valB = b[sortConfigPassageiro.coluna] || '';
            
            if (sortConfigPassageiro.coluna === 'voos' || sortConfigPassageiro.coluna === 'horas') {
                valA = a[sortConfigPassageiro.coluna];
                valB = b[sortConfigPassageiro.coluna];
            } else {
                valA = valA.toString().toLowerCase();
                valB = valB.toString().toLowerCase();
            }
            
            if (sortConfigPassageiro.direcao === 'asc') return valA > valB ? 1 : -1;
            return valA < valB ? 1 : -1;
        });
    }
    
    window.aplicarFiltrosPassageiro = function() {
        const ano = document.getElementById('filtroAnoPassageiro')?.value || '';
        const mes = document.getElementById('filtroMesPassageiro')?.value || '';
        const nome = (document.getElementById('filtroNomePassageiro')?.value || '').toLowerCase().trim();
        const orgao = (document.getElementById('filtroOrgaoPassageiro')?.value || '').toLowerCase().trim();
        const cargo = (document.getElementById('filtroCargoPassageiro')?.value || '').toLowerCase().trim();
        
        // Salva estado
        _filtroPassageiroAno = ano;
        _filtroPassageiroMes = mes;
        _filtroPassageiroNome = document.getElementById('filtroNomePassageiro')?.value || '';
        _filtroPassageiroOrgao = document.getElementById('filtroOrgaoPassageiro')?.value || '';
        _filtroPassageiroCargo = document.getElementById('filtroCargoPassageiro')?.value || '';
        
        dadosFiltradosPassageiros = dadosCompletos.filter(v => {
            if (ano && v.ano !== ano) return false;
            if (mes && v.mes !== mes) return false;
            if (nome && !(v.passageiro||'').toLowerCase().includes(nome)) return false;
            if (orgao && !(v.orgao_passageiro||'').toLowerCase().includes(orgao)) return false;
            if (cargo && !(v.cargo_passageiro||'').toLowerCase().includes(cargo)) return false;
            return true;
        });
        
        atualizarPassageirosUnicos();
        paginaAtualPassageiro = 1;
        renderizarConsultaPassageiro();
    };
    
    window.limparFiltrosPassageiro = function() {
        const anosDisp = [...new Set(dadosCompletos.map(d => d.ano))].sort((a,b)=>b-a);
        _filtroPassageiroAno = anosDisp[0] || '';
        _filtroPassageiroMes = '';
        _filtroPassageiroNome = '';
        _filtroPassageiroOrgao = '';
        _filtroPassageiroCargo = '';
        
        dadosFiltradosPassageiros = dadosCompletos.filter(v => !_filtroPassageiroAno || v.ano === _filtroPassageiroAno);
        atualizarPassageirosUnicos();
        paginaAtualPassageiro = 1;
        renderizarConsultaPassageiro();
    };

    function renderizarPaginacaoPassageiro(totalPaginas) {
        const container = document.getElementById('paginacaoContainerPassageiro');
        if (!container) return;
        
        const inicio = (paginaAtualPassageiro - 1) * itensPorPaginaPassageiro + 1;
        const fim = Math.min(paginaAtualPassageiro * itensPorPaginaPassageiro, passageirosUnicos.length);
        
        let html = `
            <div class="d-flex align-items-center justify-content-center gap-3 w-100">
                <div class="pagination-info">${inicio}-${fim} de ${passageirosUnicos.length} resultados</div>
                <nav><ul class="pagination mb-0">
                    <li class="page-item ${paginaAtualPassageiro === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="mudarPaginaPassageiro(${paginaAtualPassageiro - 1}); return false;">«</a></li>`;
        
        let inicioPaginas = Math.max(1, paginaAtualPassageiro - 2);
        let fimPaginas = Math.min(totalPaginas, inicioPaginas + 4);
        
        for (let i = inicioPaginas; i <= fimPaginas; i++) {
            html += `<li class="page-item ${i === paginaAtualPassageiro ? 'active' : ''}"><a class="page-link" href="#" onclick="mudarPaginaPassageiro(${i}); return false;">${i}</a></li>`;
        }
        
        html += `<li class="page-item ${paginaAtualPassageiro === totalPaginas ? 'disabled' : ''}"><a class="page-link" href="#" onclick="mudarPaginaPassageiro(${paginaAtualPassageiro + 1}); return false;">»</a></li>
                </ul></nav>
                <select class="items-per-page" onchange="alterarItensPorPaginaPassageiro(this.value)">
                    <option value="100" ${itensPorPaginaPassageiro == 100 ? 'selected' : ''}>100</option>
                    <option value="150" ${itensPorPaginaPassageiro == 150 ? 'selected' : ''}>150</option>
                    <option value="200" ${itensPorPaginaPassageiro == 200 ? 'selected' : ''}>200</option>
                    <option value="500" ${itensPorPaginaPassageiro == 500 ? 'selected' : ''}>500</option>
                </select>
            </div>
        `;
        
        container.innerHTML = html;
    }
    
    window.mudarPaginaPassageiro = function(pagina) {
        const totalPaginas = Math.ceil(passageirosUnicos.length / itensPorPaginaPassageiro);
        if (pagina < 1 || pagina > totalPaginas) return;
        paginaAtualPassageiro = pagina;
        renderizarConsultaPassageiro();
    };
    
    window.alterarItensPorPaginaPassageiro = function(valor) {
        itensPorPaginaPassageiro = parseInt(valor);
        paginaAtualPassageiro = 1;

    };

    window.baixarCSVAno = async function() {
        const ano = document.getElementById('anoDownload')?.value;
        if (!ano) {
            alert('Selecione um ano para baixar.');
            return;
        }
        
        const dadosAno = dadosCompletos.filter(v => v.ano === ano);
        if (dadosAno.length === 0) {
            alert('Dados não encontrados para o ano selecionado.');
            return;
        }
        
        const cabecalhos = ['ano', 'mes', 'historico', 'horas_voadas', 'aeronave', 'numero_db', 'data_voo', 'origem', 'destino', 'passageiro', 'cargo_passageiro', 'orgao_passageiro'];
        const linhas = dadosAno.map(item => cabecalhos.map(cab => `"${(item[cab] || '').toString().replace(/"/g, '""')}"`).join(';'));
        const csv = [cabecalhos.join(';'), ...linhas].join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `voos_${ano}.csv`;
        link.click();
    };

        const doc = new jsPDF({ orientation: 'landscape' });
        const dados = passageirosUnicos.map(p => [p.nome, p.orgao, p.cargo, p.voos, formatarHoras(p.horas)]);
        doc.autoTable({
            head: [['Passageiro', 'Órgão', 'Cargo', 'Voos', 'Horas']],
            body: dados,
            didDrawPage: (data) => {
                doc.setFontSize(10);
                doc.text('Voos Oficiais - Passageiros', 14, 10);
                doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')}`, 14, doc.internal.pageSize.height - 5);
            }
        });
        doc.save('passageiros_voos.pdf');
    };
    
    // ============================================
    // COMPARTILHAMENTO E UTILITÁRIOS
    // ============================================
    window.toggleShare = function(id) {
        document.querySelectorAll('.share-options').forEach(opt => opt.classList.remove('show'));
        document.getElementById(`shareOptions${id}`)?.classList.toggle('show');
    };
    
    window.copiarLink = function(e, id) {
        e.preventDefault();
        navigator.clipboard.writeText(window.location.href).then(() => {
            const toast = document.getElementById('toastSucesso');
            if (toast) {
                toast.style.display = 'flex';
                toast.style.animation = 'none';
                toast.offsetHeight;
                toast.style.animation = 'fadeInUp 0.3s ease';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            }
        });
        document.getElementById(`shareOptions${id}`)?.classList.remove('show');
    };

    // Variável para guardar dados do modal atual
    let _modalPassageiroAtual = null;

    window.exportarModalDetalhePDF = function() {
        if (!_modalPassageiroAtual) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape' });
        doc.setFontSize(12);
        doc.text(`Histórico de Voos — ${_modalPassageiroAtual.nome}`, 14, 10);
        const viagens = dadosCompletos.filter(v => v.passageiro === _modalPassageiroAtual.nome)
            .sort((a,b) => (b.data_voo||'').localeCompare(a.data_voo||''));
        doc.autoTable({
            startY: 18,
            head: [['Data','Origem','Destino','Histórico','Horas','Aeronave']],
            body: viagens.map(v => [formatarData(v.data_voo), v.origem, v.destino, v.historico, v.horas_voadas, v.aeronave]),
            headStyles: { fillColor: [32,68,93] },
            styles: { fontSize: 8 },
            didDrawPage: () => { doc.setFontSize(9); doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')}`, 14, doc.internal.pageSize.height - 5); }
        });
        doc.save(`voos_${_modalPassageiroAtual.nome.replace(/\s+/g,'_')}.pdf`);
    };

    window.exportarModalDetalheCSV = function() {
        if (!_modalPassageiroAtual) return;
        const viagens = dadosCompletos.filter(v => v.passageiro === _modalPassageiroAtual.nome)
            .sort((a,b) => (b.data_voo||'').localeCompare(a.data_voo||''));
        const cab = ['data_voo','origem','destino','historico','horas_voadas','aeronave'];
        const linhas = viagens.map(v => cab.map(c => `"${(v[c]||'').replace(/"/g,'""')}"`).join(';'));
        const csv = [cab.join(';'), ...linhas].join('\n');
        const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `voos_${_modalPassageiroAtual.nome.replace(/\s+/g,'_')}.csv`; a.click();
    };
    
    window.compartilharFacebook = function(e, id) {
        e.preventDefault();
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
        document.getElementById(`shareOptions${id}`)?.classList.remove('show');
    };
    
    window.compartilharTwitter = function(e, id) {
        e.preventDefault();
        window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent('Voos Oficiais - Governo de Minas Gerais')}`, '_blank');
        document.getElementById(`shareOptions${id}`)?.classList.remove('show');
    };
    
    window.compartilharWhatsApp = function(e, id) {
        e.preventDefault();
        window.open(`https://wa.me/?text=${encodeURIComponent('Voos Oficiais - Governo de Minas Gerais ' + window.location.href)}`, '_blank');
        document.getElementById(`shareOptions${id}`)?.classList.remove('show');
    };
    
    window.voltarAoTopo = function() {
        if (window.parent && window.parent !== window) {
            window.parent.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };
    
    // Inicialização
    document.addEventListener('DOMContentLoaded', function() {
        setupAtualizacaoData();
        carregarDadosIniciais();
        
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
        tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));
    });

    // ============================================================
    // IFRAME RESIZE OBSERVER
    // ============================================================
    (function () {
        function sendHeight() {
            const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
            try { window.parent.postMessage({ iframeHeight: h, iframeResize: true, type: 'resize' }, '*'); } catch(e) {}
        }
        if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
        else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
        sendHeight();
    })();
</script>
