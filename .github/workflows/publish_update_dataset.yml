name: CKAN

on:
  push:
    paths:
      - 'dataset/**'
      - 'upload/**'

jobs:
  publish_update:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'    

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip uninstall numpy -y
          pip install numpy==1.23.5 --no-cache-dir
          pip install "urllib3<2" "charset-normalizer<4"
          pip install -r requirements.txt
          pip install requests

      - name: Convert CSV
        run: task csv

      - name: Commit CSV
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Converte Excel para CSV via script.

      - name: Create datapackage.yaml
        env:
          DATASET_NAME: ${{ github.event.repository.name }}
          OWNER_ORG: ${{ secrets.OWNER_ORG }}
        run: task yaml

      - name: Commit new datapackage.yaml
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Cria datapackage.yaml caso não exista via script.

      - name: Create datapackage.json
        run: task json

      - name: Commit new datapackage.json
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Cria datapackage.json via script.

      - name: Local dataset validation
        run: task validate

      - name: Commit new datapackage_validation.json
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Cria datapackage_validation.json via script.

      - name: Create Report
        continue-on-error: true
        run: task report

      - name: Commit new index.html report file.
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Cria arquivo index.html de validação.

      - id: string
        uses: ASzc/change-string-case-action@v1
        with:
          string: ${{ github.actor }}

      - name: Sync resources with CKAN
        env:
          CKAN_HOST: ${{ secrets.CKAN_HOST }}
          CKAN_KEY: ${{ secrets[format('CKAN_KEY_{0}', steps.string.outputs.uppercase)] }}
        run: |
          python - <<'EOF'
          import json
          import subprocess
          import os
          import sys
          
          host = os.environ["CKAN_HOST"]
          key = os.environ["CKAN_KEY"]
          
          with open("dataset/datapackage.json") as f:
              dp = json.load(f)
          
          dataset = dp["name"]
          
          print(f"Checking dataset: {dataset}")
          print(f"Using CKAN host: {host}")
          
          # Get existing resources from CKAN
          try:
              result = subprocess.run([
                  "dpckan",
                  "--ckan-host", host,
                  "--ckan-key", key,
                  "dataset", dataset, "show"
              ], capture_output=True, text=True)
              
              print(f"Return code: {result.returncode}")
              print(f"Stdout: {result.stdout[:500]}...")  # Print first 500 chars
              print(f"Stderr: {result.stderr}")
              
              if result.returncode != 0:
                  print(f"Command failed with return code {result.returncode}")
                  print("Attempting to list all datasets to debug...")
                  
                  # Try to list datasets to see if authentication works
                  list_result = subprocess.run([
                      "dpckan",
                      "--ckan-host", host,
                      "--ckan-key", key,
                      "dataset", "list"
                  ], capture_output=True, text=True)
                  
                  print(f"Dataset list stdout: {list_result.stdout}")
                  print(f"Dataset list stderr: {list_result.stderr}")
                  
                  # Check if we can access the dataset via CKAN API directly
                  import requests
                  headers = {"Authorization": key}
                  response = requests.get(f"{host.rstrip('/')}/api/3/action/package_show", 
                                        params={"id": dataset},
                                        headers=headers)
                  
                  print(f"Direct API call status: {response.status_code}")
                  if response.status_code == 200:
                      print("Dataset exists! Direct API call succeeded.")
                      data = response.json()
                      if data["success"]:
                          existing_resources = {r["name"]: r for r in data["result"]["resources"]}
                          print(f"Found {len(existing_resources)} existing resources via direct API")
                      else:
                          existing_resources = {}
                  else:
                      print(f"Direct API call failed: {response.text}")
                      existing_resources = {}
                      
              else:
                  # Try to parse only the JSON part of the output
                  output_lines = result.stdout.strip().split('\n')
                  json_str = ''
                  for line in output_lines:
                      if line.strip().startswith('{'):
                          json_str = line
                          break
                  
                  if json_str:
                      data = json.loads(json_str)
                      existing_resources = {r["name"]: r for r in data.get("resources", [])}
                      print(f"Found {len(existing_resources)} existing resources via dpckan")
                  else:
                      print("No JSON found in dpckan output")
                      existing_resources = {}
                      
          except Exception as e:
              print(f"Unexpected error: {e}")
              existing_resources = {}
          
          print(f"\nExisting resources in CKAN: {list(existing_resources.keys())}")
          print(f"Resources in datapackage.json: {[r['name'] for r in dp['resources']]}")
          
          # Sync each resource
          for r in dp["resources"]:
              name = r["name"]
              
              if name in existing_resources:
                  print(f"\n🔄 Resource '{name}' exists. Updating...")
                  update_result = subprocess.run([
                      "dpckan",
                      "--datastore",
                      "--datapackage", "dataset/datapackage.json",
                      "--ckan-host", host,
                      "--ckan-key", key,
                      "resource", name, "update"
                  ], capture_output=True, text=True)
                  
                  if update_result.returncode == 0:
                      print(f"  ✓ Successfully updated '{name}'")
                  else:
                      print(f"  ✗ Failed to update '{name}': {update_result.stderr}")
              else:
                  print(f"\n🆕 Resource '{name}' does not exist. Creating...")
                  create_result = subprocess.run([
                      "dpckan",
                      "--datastore",
                      "--datapackage", "dataset/datapackage.json",
                      "--ckan-host", host,
                      "--ckan-key", key,
                      "resource", name, "create"
                  ], capture_output=True, text=True)
                  
                  if create_result.returncode == 0:
                      print(f"  ✓ Successfully created '{name}'")
                  else:
                      print(f"  ✗ Failed to create '{name}': {create_result.stderr}")
          
          print("\n✅ Sync completed!")
          EOF
